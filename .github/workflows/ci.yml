name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check JavaScript
        run: |
          for f in $(find src -name '*.js'); do
            echo "checking $f"
            node --check "$f"
          done
      - name: Required files present
        run: |
          test -f index.html
          test -f styles/observatory.css
          test -f assets/favicon.svg
